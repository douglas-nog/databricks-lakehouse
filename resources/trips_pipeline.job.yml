resources:
  jobs:
    trips_pipeline:
      name: trips_pipeline
      schedule:
        quartz_cron_expression: "0 15 19 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: UNPAUSED
      tasks:
        - task_key: setup
          python_wheel_task:
            package_name: mobility
            entry_point: setup-uc
            parameters:
              - "--catalog"
              - "${var.catalog}"
          environment_key: default

        - task_key: bronze
          depends_on:
            - task_key: setup
          python_wheel_task:
            package_name: mobility
            entry_point: ingest-bronze
            parameters:
              - "--catalog"
              - "${var.catalog}"
          environment_key: default

        - task_key: silver
          depends_on:
            - task_key: bronze
          python_wheel_task:
            package_name: mobility
            entry_point: transform-silver
            parameters:
              - "--catalog"
              - "${var.catalog}"
          environment_key: default

        - task_key: gold
          depends_on:
            - task_key: silver
          python_wheel_task:
            package_name: mobility
            entry_point: build-gold
            parameters:
              - "--catalog"
              - "${var.catalog}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl
